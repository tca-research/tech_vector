name: Sync Zoho ABN webhook

# Event-driven, not scheduled: a Zoho-side process POSTs the full current
# Tech Council member list directly to GitHub's repository_dispatch API
# (see scripts/MANUAL_DATA_PULL_INSTRUCTIONS_TECH_COUNCIL_ABNS.md's "Zoho
# webhook setup" section) — carrying ALL currently-active member Accounts
# in one payload (accounts_data: [{account_id, company_name, abn}, ...]),
# not a single record's create/edit/delete. scripts/sync_zoho_abn_webhook.py
# always overwrites Tech_Council_ABNs.csv wholesale with what it receives —
# self-healing by construction, since every delivery already is the full
# true state. No Zoho credentials live in this repo: the one credential
# this needs (a GitHub PAT, so Zoho can call the dispatches API) is
# configured inside Zoho's own webhook action, not here.
#
# Also runnable via workflow_dispatch, purely for testing — this is the
# only way to exercise a *branch's* version of this file at all:
# repository_dispatch always runs whatever copy of this workflow exists on
# the default branch, with no ref you can point elsewhere, so a change
# pushed to a feature branch can't be tested via a real/simulated Zoho
# webhook call until it's merged. workflow_dispatch's "Run workflow" button
# (or `ref` in the API call) lets you pick the branch instead.
on:
  repository_dispatch:
    types: [tech_vector_export]
  workflow_dispatch:
    inputs:
      payload_json:
        description: 'client_payload JSON to test with, e.g. {"sync_date": "...", "account_count": 2, "accounts_data": [{"company_name": "Test Co", "abn": "11 111 111 111"}]}'
        type: string
        required: true

concurrency:
  group: sync-zoho-abn
  cancel-in-progress: false   # queue, don't race, if events arrive close together

permissions:
  contents: write   # to commit the updated ABN CSV back to main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # ssh-key: see rebuild-data.yml's Checkout step for why — same reason,
      # same deploy key, same DEPLOY_KEY_SETUP.md.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pandas and pytest
        run: pip install "pandas>=2.0" pytest

      # Only this script's own unit tests — this workflow never touches
      # charts/build_charts.py, so the rest of the suite would just be
      # testing code this run can't have affected. Runs before the sync
      # itself so a regression here (e.g. in normalize_abn/extract_abns)
      # fails the workflow before it ever touches the real payload or the
      # CSV, not after.
      - name: Run sync_zoho_abn_webhook.py's own tests
        run: python -m pytest tests/test_zoho_webhook.py

      - name: Apply full ABN sync from webhook payload
        id: sync
        run: python3 scripts/sync_zoho_abn_webhook.py
        env:
          ZOHO_WEBHOOK_PAYLOAD: ${{ github.event_name == 'workflow_dispatch' && inputs.payload_json || toJson(github.event.client_payload) }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/input/automated_pull/Tech_Council_ABNs.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Zoho webhook: full ABN sync (${{ steps.sync.outputs.written_count }} written, ${{ steps.sync.outputs.skipped_count }} skipped, sync_date=${{ steps.sync.outputs.sync_date }})"
            git push origin HEAD:main
          fi
