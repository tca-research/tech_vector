name: Rebuild data and charts

# GitHub Actions cron can't express "every 8 weeks" directly, so this runs
# weekly and gates itself on a day-count-since-anchor check below. Anchor:
# 2026-08-10 (a Monday) is day 0; every 56 days after that is a rebuild.
on:
  schedule:
    - cron: '0 20 * * 1'   # Monday 20:00 UTC — same weekday as the anchor date
  workflow_dispatch:
    inputs:
      force:
        description: 'Run the full rebuild regardless of the 8-week cycle gate'
        type: boolean
        default: false

concurrency:
  group: rebuild-data
  cancel-in-progress: false

permissions:
  contents: write   # to commit regenerated data/chart files back to main

env:
  CYCLE_ANCHOR_DATE: '2026-08-10'
  CYCLE_LENGTH_DAYS: '56'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      # ssh-key checks the repo out with a deploy key instead of the default
      # GITHUB_TOKEN — needed once main requires PRs, since the built-in
      # github-actions[bot] identity can't be added to a ruleset's bypass
      # list (it's a system account, not an installable App or deploy key)
      # and this workflow needs to keep pushing straight to main. See
      # DEPLOY_KEY_SETUP.md for how the key itself is provisioned.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Check whether this is a rebuild week
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "Manual force run — bypassing the cycle gate."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          days_since=$(( ( $(date -u -d "$today" +%s) - $(date -u -d "$CYCLE_ANCHOR_DATE" +%s) ) / 86400 ))
          echo "Today (UTC): $today; days since anchor ($CYCLE_ANCHOR_DATE): $days_since"
          if [ "$days_since" -ge 0 ] && [ $(( days_since % CYCLE_LENGTH_DAYS )) -eq 0 ]; then
            echo "Rebuild week — proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not a rebuild week — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up R
        if: steps.gate.outputs.should_run == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install Python dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Install R dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: Rscript -e 'install.packages(c("readabs", "readrba"), repos = "https://cloud.r-project.org")'

      - name: Fetch all source data
        if: steps.gate.outputs.should_run == 'true'
        run: python3 scripts/automated_fetch_all_data.py

      - name: Clean manual-pull CSVs
        if: steps.gate.outputs.should_run == 'true'
        run: python3 scripts/manual_data_prep.py --dir data/input/manual_pull/

      - name: Aggregate data
        if: steps.gate.outputs.should_run == 'true'
        run: |
          set -o pipefail
          python3 scripts/automated_data_prep.py 2>&1 | tee /tmp/data_prep.log
          if grep -q '^Error:' /tmp/data_prep.log; then
            echo "::error::automated_data_prep.py reported an Error line — failing explicitly."
            exit 1
          fi

      - name: Build charts
        if: steps.gate.outputs.should_run == 'true'
        run: python3 scripts/charts/build_charts.py

      # Self-gates this workflow against exactly the failure mode that
      # motivated it: a bad automated pull silently producing a broken
      # chart (wrong axis units, a console error, a mangled date). Running
      # the full suite — including the Playwright checks against the
      # charts/*.html this run just regenerated — here, before the commit
      # step, means a failure stops the push from ever happening, which is
      # stronger than gating a PR's merge (nothing bad reaches main either
      # way, but this doesn't depend on how branch protection is set up).
      - name: Install test dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install -r requirements-dev.txt

      - name: Install Playwright's Chromium browser
        if: steps.gate.outputs.should_run == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Run tests against the freshly-built charts
        if: steps.gate.outputs.should_run == 'true'
        run: python -m pytest

      - name: Commit regenerated files back to main
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/output/*.csv data/input/manual_pull/*_cleaned.csv charts/*.html charts/chart_manifest.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated data refresh + chart rebuild ($(date -u +%Y-%m-%d))"
            git push origin HEAD:main
          fi
