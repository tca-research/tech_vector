name: Handle Zoho CRM Tech Vector Data

on:
  repository_dispatch:
    types:
      - tech_vector_export

permissions:
  contents: write

jobs:
  convert-to-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Process JSON to CSV
        env:
          ACCOUNTS_DATA: ${{ toJson(github.event.client_payload.accounts_data) }}
        shell: python
        run: |
          import os
          import json
          import csv
      - name: Process JSON to CSV
        shell: python
        env:
          ACCOUNTS_DATA: ${{ toJson(github.event.client_payload.accounts_data) }}
        run: |
          import os
          import json
          import csv

          raw_data = os.environ.get("ACCOUNTS_DATA", "[]")

          try:
              accounts = json.loads(raw_data)
          except json.JSONDecodeError:
              print(f"Unable to decode JSON: {raw_data}")
              raise

          csv_filename = "active_memberships.csv"

          with open(csv_filename, "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)

              writer.writerow([
                  "Account ID",
                  "Company Name",
                  "ABN"
              ])

              for account in accounts:
                  writer.writerow([
                      account.get("account_id", ""),
                      account.get("company_name", ""),
                      account.get("abn", "")
                  ])

          print(f"Wrote {len(accounts)} rows to {csv_filename}")

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add active_memberships.csv

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Update active_memberships.csv from Zoho CRM"
          git push
