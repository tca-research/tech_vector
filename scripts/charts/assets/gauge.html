<div class="page">
  <figure class="chart-card" id="card-gauge">
    <div class="kpi-card" id="kpi-card">
      <div class="kpi-header">
        <span class="kpi-icon" id="kpi-icon"></span>
        <h3 class="kpi-title" id="kpi-title"></h3>
      </div>
      <div class="kpi-value-row">
        <span class="kpi-value" id="kpi-value"></span>
        <span class="kpi-pill" id="kpi-pill"></span>
      </div>
      <p class="chart-caption" id="kpi-description"></p>
    </div>
  </figure>
</div>

<div class="tooltip" id="tooltip"></div>
