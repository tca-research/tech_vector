<title>Tech Vector — hiring vs macro conditions</title>
<style>
:root {
  --surface: #ffffff;
  --surface-alt: #f7f5f8;
  --ink-primary: #18151d;
  --ink-secondary: #4d4954;
  --ink-muted: #8b8792;
  --grid: #e8e6ea;
  --axis: #c7c3cb;
  --card-border: #ece9ee;

  --cat-1: #EC3E9E; --cat-1-text: #A8256C;
  --cat-2: #E0904A; --cat-2-text: #9C5716;
  --cat-3: #5B9BE0; --cat-3-text: #22589C;
  --cat-4: #5A3A9E; --cat-4-text: #4A2E85;
  --cat-5: #D998D0; --cat-5-text: #953F85;
  --cat-5-tint: #F8EEF6;

  /* Status (not categorical) — reserved for "target met" state, never used
     for series/identity. */
  --status-good: #1B7A43;
  --status-good-bg: #E3F5EA;

  /* KPI card (gauge) title/value brand colors. */
  --kpi-title: #DC389D;
  --kpi-value: #7D01E4;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  /* Matches figure.chart-card's own background (not --surface-alt) so any
     leftover space below the card — a browser window or iframe taller than
     the actual content, e.g. before a parent page applies the postMessage
     resize height — reads as plain white, not a visibly mismatched grey band. */
  background: var(--surface);
  color: var(--ink-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.page { margin: 0; padding: 0; }

figure.chart-card {
  position: relative;
  margin: 0;
  background: var(--surface);
  padding: 16px 18px 12px;
  overflow: hidden;
}
.chart-title { font-size: 17px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
.chart-caption { font-size: 13.5px; color: var(--ink-secondary); line-height: 1.55; margin: 0 0 16px; max-width: 900px; }
.chart-caption b { color: var(--ink-primary); }

.legend-row { display: flex; flex-wrap: wrap; gap: 16px 22px; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-secondary); }
.legend-swatch { width: 11px; height: 11px; border-radius: 50%; flex: none; }
.legend-swatch.line { width: 16px; height: 3px; border-radius: 2px; }
.legend-remove {
  font: inherit; font-size: 14px; line-height: 1; border: none; background: transparent;
  color: var(--ink-muted); cursor: pointer; padding: 0;
}
.legend-remove:hover { color: var(--ink-primary); }

.series-search { position: relative; display: inline-block; width: 100%; max-width: 340px; }
.series-search-input {
  font: inherit; font-size: 14px; width: 100%;
  padding: 9px 12px; border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--surface-alt); color: var(--ink-primary);
}
.series-search-input:focus { outline: 2px solid var(--cat-3); outline-offset: 1px; }
.series-suggestions {
  display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 20;
  max-height: 220px; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--card-border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14); padding: 6px;
}
.series-suggestions.open { display: block; }
.series-suggestion { padding: 7px 8px; border-radius: 6px; font-size: 13.5px; color: var(--ink-primary); cursor: pointer; }
.series-suggestion:hover { background: var(--surface-alt); }
.series-suggestion.disabled { color: var(--ink-muted); cursor: default; }

.chart-mount { width: 100%; }
.chart-mount svg { width: 100%; height: auto; display: block; overflow: visible; }

.chart-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--card-border); flex-wrap: wrap; }
.chart-source { font-size: 12px; color: var(--ink-muted); }
.download-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font: inherit; font-size: 12.5px; font-weight: 600; color: var(--ink-secondary);
  background: var(--surface-alt); border: 1px solid var(--card-border); border-radius: 7px;
  padding: 5px 11px; cursor: pointer;
}
.download-btn:hover { color: var(--ink-primary); border-color: var(--axis); }
.download-btn svg { width: 13px; height: 13px; flex: none; }

.filter-row { margin-bottom: 16px; }
.filter-note { font-size: 12px; color: var(--ink-muted); margin: 8px 0 0; }

.filter-select {
  font: inherit; font-size: 14px; min-width: 240px;
  padding: 9px 34px 9px 12px; border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--surface-alt); color: var(--ink-primary); cursor: pointer;
}
.filter-select:focus { outline: 2px solid var(--cat-3); outline-offset: 1px; }

.multiselect { position: relative; display: inline-block; }
.multiselect-button {
  font: inherit; font-size: 14px; display: flex; align-items: center; gap: 10px;
  justify-content: space-between; min-width: 240px;
  padding: 9px 12px; border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--surface-alt); color: var(--ink-primary); cursor: pointer;
}
.multiselect-button:focus { outline: 2px solid var(--cat-3); outline-offset: 1px; }
.multiselect-button .chevron { color: var(--ink-muted); font-size: 11px; flex: none; }
.multiselect-panel {
  display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 20;
  min-width: 260px; max-height: 280px; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--card-border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14); padding: 6px;
}
.multiselect-panel.open { display: block; }
.multiselect-option {
  display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 6px;
  font-size: 13.5px; color: var(--ink-primary); cursor: pointer;
}
.multiselect-option:hover { background: var(--surface-alt); }
.multiselect-option:has(input:disabled) { color: var(--ink-muted); cursor: not-allowed; }
.multiselect-option input:disabled { cursor: not-allowed; }

/* Fixed regardless of description length (1 vs. 2 lines) so gauges shown
   side by side (e.g. as separate iframes on the live site) resize to the
   same height and align, rather than each fitting only its own content. */
.kpi-card { max-width: 420px; min-height: 156px; }
.kpi-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.kpi-icon { flex: none; width: 28px; height: 28px; }
.kpi-icon svg { width: 100%; height: 100%; display: block; }
.kpi-title { font-size: 19px; font-weight: 700; color: var(--kpi-title); margin: 0; }
.kpi-value-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.kpi-value { font-size: 52px; font-weight: 800; line-height: 1; color: var(--kpi-value); }
.kpi-pill {
  display: inline-block; font-size: 13px; font-weight: 700; padding: 5px 12px;
  border-radius: 999px; color: var(--ink-secondary); background: var(--surface-alt);
}
.kpi-pill.kpi-pill--good { color: var(--status-good); background: var(--status-good-bg); }
#kpi-description { max-width: none; }

.ranked-bar-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
.dropdown-label { font-size: 13px; color: var(--ink-secondary); display: flex; align-items: center; gap: 8px; }

.tab-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.tab-btn {
  font: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer;
  padding: 10px 18px; border-radius: 999px; border: 1px solid var(--cat-4);
  background: var(--surface); color: var(--cat-4-text);
}
.tab-btn.active { background: var(--cat-4); color: #fff; border-color: var(--cat-4); }

.small-multiples-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 22px 18px;
}
.sm-panel-title { font-size: 13px; font-weight: 700; margin: 0 0 6px; }

.stacked-sm-panels { display: flex; flex-direction: column; gap: 20px; }
.stacked-sm-panel svg { display: block; width: 100%; height: auto; }

.dual-panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.dual-panel svg { display: block; width: 100%; height: auto; }
@media (max-width: 640px) { .dual-panel-grid { grid-template-columns: 1fr; } }

.reference-list { margin: 0; padding-left: 20px; }
.reference-item { font-size: 13.5px; line-height: 1.6; color: var(--ink-primary); margin-bottom: 10px; }
.reference-item em { font-style: italic; }
.reference-item a { color: var(--cat-4-text); }

.tooltip {
  position: fixed; pointer-events: none; z-index: 50;
  background: var(--ink-primary); color: var(--surface);
  font-size: 12.5px; line-height: 1.45; border-radius: 8px;
  padding: 8px 10px; box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  opacity: 0; transform: translate(-9999px, -9999px);
  transition: opacity 0.08s ease-out;
  max-width: 240px;
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-value { font-weight: 700; }
.tooltip .tt-row { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.tooltip .tt-key { width: 10px; height: 2px; border-radius: 1px; flex: none; }
.tooltip .tt-title { font-weight: 700; margin-bottom: 4px; opacity: 0.85; }

.bar-annotation {
  box-sizing: border-box; height: 100%; display: flex; align-items: center;
  font-size: 12px; line-height: 1.5; color: var(--ink-secondary);
  background: var(--cat-5-tint); border-radius: 8px; padding: 8px 10px;
}

.end-label { font-weight: 700; font-size: 12.5px; }
.axis-label { fill: var(--ink-muted); font-size: 11.5px; }
.grid-line { stroke: var(--grid); stroke-width: 1; }
.axis-line { stroke: var(--axis); stroke-width: 1; }

@media (max-width: 640px) {
  figure.chart-card { padding: 12px 12px 10px; }
  .legend-row { gap: 10px 16px; }
}

</style>

  </figure>
</div>

function applyChromeConfig(cfg) {
  if (cfg.pageTitle) document.title = cfg.pageTitle;

  const sourceEl = document.getElementById("chart-source");
  if (sourceEl) {
    // Strip any trailing period a config's source string already ends with —
    // whether or not it does is a config-authoring detail, not something

    // never ends up double-punctuated ("Australia.. Chart last updated...").
    let text = (cfg.source || "").replace(/\.+\s*$/, "");
    if (cfg.lastUpdated) {

    } else if (text) {
      text += ".";

function legendItem(container, color, label, lineStyle, onRemove) {

  return "M " + (x + r.tl) + " " + y +
    " H " + (x + w - r.tr) +
    " A " + r.tr + " " + r.tr + " 0 0 1 " + (x + w) + " " + (y + r.tr) +
    " V " + (y + h - r.br) +
    " A " + r.br + " " + r.br + " 0 0 1 " + (x + w - r.br) + " " + (y + h) +
    " H " + (x + r.bl) +
    " A " + r.bl + " " + r.bl + " 0 0 1 " + x + " " + (y + h - r.bl) +
    " V " + (y + r.tl) +
    " A " + r.tl + " " + r.tl + " 0 0 1 " + (x + r.tl) + " " + y +
    " Z";
}
// Draws one 100%-stacked row of `series` segments (each { column, label,
// color }) sized from `values[column]` (0-100), from x0 to x0+plotW. Returns
// the row's formatted values, in series order, for CSV export.
function drawStackedBarSegments(svg, x0, y, plotW, barH, series, values, tooltipTitle) {
  let cursor = x0;
  const tableRow = [];
  series.forEach((s, si) => {
    const val = values[s.column];
    const w = (val / 100) * plotW;
    const isFirst = si === 0;
    const isLast = si === series.length - 1;
    const r = 4;
    const radii = { tl: isFirst ? r : 0, bl: isFirst ? r : 0, tr: isLast ? r : 0, br: isLast ? r : 0 };
    const color = colorVar(s.color);
    if (w > 0.5) {
      const path = roundedRectPath(cursor, y, w, barH, radii);
      const seg = el("path", { d: path, fill: color }, svg);
      const hit = el("rect", { x: cursor, y: y - 2, width: w, height: barH + 4, fill: "transparent" }, svg);
      const valueLabel = (Math.round(val * 10) / 10) + "%";
      [seg, hit].forEach((node) => {
        node.style.cursor = "pointer";
        node.addEventListener("pointermove", (ev) => {
          seg.style.filter = "brightness(1.08)";
          showTooltip(ev.clientX, ev.clientY, ttBox(tooltipTitle, [ttRow(color, s.label, valueLabel)]));
        });
        node.addEventListener("pointerleave", () => { seg.style.filter = ""; hideTooltip(); });
      });
      if (w > 36) {
        textEl(cursor + w / 2, y + barH / 2 + 4, valueLabel, { "text-anchor": "middle", "font-size": "12", "font-weight": "700", fill: "#fff" }, svg);
      } else {
        textEl(cursor + w + 6, y + barH / 2 + 4, valueLabel, { "font-size": "12", "font-weight": "700", fill: colorTextVar(s.color) }, svg);
      }
      tableRow.push(valueLabel);
    } else {
      tableRow.push("0%");
    }
    cursor += w;
  });
  return tableRow;
}

// csv download — replaces the table-view toggle with a direct data export
const downloadRegistry = {};
function csvCell(v) {
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function registerDownload(key, filename, columns, rows) {
  const csv = [columns, ...rows].map((r) => r.map(csvCell).join(",")).join("\r\n");
  downloadRegistry[key] = { filename, csv };
}
function wireDownloadButtons() {
  document.querySelectorAll(".download-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const entry = downloadRegistry[btn.dataset.target];
      if (!entry) return;
      const blob = new Blob([entry.csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = entry.filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
  });
}

// iframe auto-resize — lets a parent page embedding this chart in an
// <iframe> size that iframe to fit the chart's actual rendered height
// (figure.chart-card has no min-height, so scrollHeight reflects real
// content). Sent on load, on window resize, and whenever the rendered
// height itself changes (dropdown/search interactions, responsive reflow).
function sendIframeHeight() {
  if (window.parent === window) return; // not embedded — nothing to do
  window.parent.postMessage({ type: "iframeHeight", height: document.documentElement.scrollHeight }, "*");
}
window.addEventListener("load", sendIframeHeight);
window.addEventListener("resize", sendIframeHeight);
if (typeof ResizeObserver !== "undefined") {
  new ResizeObserver(sendIframeHeight).observe(document.body);
}


// SMALL MULTIPLES — macro panel + N dual-line occupation panels
// All dataset-specific values (caption, legend, panel titles/series, which
// Metric/Occupation keys map to which panel) come from
// DATA.smallMultiples.config, built in build_charts.py's
// SMALL_MULTIPLES_CONFIG.
function renderSmallMultiples() {
  const cfg = DATA.smallMultiples.config;
  const data = DATA.smallMultiples.data;
  applyChromeConfig(cfg);

  const caption = document.getElementById("sm-caption");
  caption.innerHTML = "";
  cfg.captionParts.forEach(([txt, cls]) => {
    const span = document.createElement("span");
    if (cls === "muted") { span.style.color = "var(--ink-muted)"; span.style.fontWeight = "700"; }
    else if (cls) { span.style.color = colorTextVar(cls); span.style.fontWeight = "700"; }
    span.textContent = txt;
    caption.appendChild(span);
  });

  const legend = document.getElementById("sm-legend");
  legend.innerHTML = "";
  cfg.legend.forEach((item) => legendItem(legend, colorVar(item.color), item.label, true));

  const grid = document.getElementById("sm-grid");
  grid.innerHTML = "";

  const START = cfg.startDate;
  const occPanels = cfg.occupationPanels;
  occPanels.forEach((p) => data[p.key].forEach((d) => assertIsoDate(d.date)));
  cfg.macroPanel.series.forEach((s) => data.macro[s.key].forEach((d) => assertIsoDate(d.date)));

  // data.sharedYAxis (set by build_charts.py's --small-multiples-y-axis
  // flag): true -> all occupation panels use one common scale (heights
  // comparable across panels); false -> each panel scales to fit only its
  // own values.
  const sharedOccMax = Math.max(...occPanels.flatMap((p) => data[p.key].filter((d) => d.date >= START).map((d) => d.value)));
  const sharedOccTicks = niceTicks(0, sharedOccMax, 4);
  const sharedOccYMax = sharedOccTicks[sharedOccTicks.length - 1];

  function drawPanel(title) {
    const wrap = document.createElement("div");
    const h3 = document.createElement("h4");
    h3.className = "sm-panel-title";
    h3.textContent = title;
    wrap.appendChild(h3);
    const mount = document.createElement("div");
    mount.className = "chart-mount";
    wrap.appendChild(mount);
    grid.appendChild(wrap);
    return mount;
  }

  const W = 260, H = 190, padL = 34, padB = 22, padT = 8, padR = 8;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  function xScaleFor(dates) {
    const t0 = new Date(dates[0]).getTime(), t1 = new Date(dates[dates.length - 1]).getTime();
    return (d) => padL + ((new Date(d).getTime() - t0) / (t1 - t0)) * plotW;
  }

  function drawAxes(svg, dates, yTicks, yMax, yFmt) {
    const x = xScaleFor(dates);
    yTicks.forEach((t) => {
      const gy = padT + plotH - (t / yMax) * plotH;
      el("line", { class: "grid-line", x1: padL, x2: W - padR, y1: gy, y2: gy }, svg);
      textEl(padL - 6, gy + 3, yFmt(t), { class: "axis-label", "text-anchor": "end", "font-size": "9.5" }, svg);
    });
    const years = [...new Set(dates.map((d) => new Date(d).getFullYear()))];
    const step = Math.ceil(years.length / 4) || 1;
    years.filter((_, i) => i % step === 0).forEach((yr) => {
      const gx = x(yr + "-06-15");
      textEl(gx, H - 4, yr, { class: "axis-label", "text-anchor": "middle", "font-size": "9.5" }, svg);
    });
    el("line", { class: "axis-line", x1: padL, x2: padL, y1: padT, y2: padT + plotH }, svg);
  }

  function linePath(svg, dates, values, yMax, color, width, dash) {
    const x = xScaleFor(dates);
    const y = (v) => padT + plotH - (v / yMax) * plotH;
    let d = "";
    values.forEach((v, i) => {
      if (v == null) return;
      d += (d ? " L " : "M ") + x(dates[i]) + " " + y(v);
    });
    const attrs = { d, fill: "none", stroke: color, "stroke-width": width, "stroke-linejoin": "round", "stroke-linecap": "round" };
    if (dash) attrs["stroke-dasharray"] = dash;
    el("path", attrs, svg);
  }

  function hoverLayer(svg, dates, seriesList, yMax) {
    const x = xScaleFor(dates);
    const hit = el("rect", { x: padL, y: padT, width: plotW, height: plotH, fill: "transparent" }, svg);
    const cross = el("line", { x1: 0, x2: 0, y1: padT, y2: padT + plotH, stroke: "var(--axis)", "stroke-width": 1, opacity: 0 }, svg);
    hit.addEventListener("pointermove", (ev) => {
      const rect = svg.getBoundingClientRect();
      const scale = rect.width / W;
      const mx = (ev.clientX - rect.left) / scale;
      let idx = 0, best = Infinity;
      dates.forEach((d, i) => { const dx = Math.abs(x(d) - mx); if (dx < best) { best = dx; idx = i; } });
      cross.setAttribute("x1", x(dates[idx]));
      cross.setAttribute("x2", x(dates[idx]));
      cross.setAttribute("opacity", 1);
      const rows = seriesList
        .filter((s) => s.values[idx] != null)
        .map((s) => ttRow(s.color, s.label, s.fmt(s.values[idx])));
      showTooltip(ev.clientX, ev.clientY, ttBox(new Date(dates[idx]).toLocaleDateString("en-AU", { year: "numeric", month: "short" }), rows));
    });
    hit.addEventListener("pointerleave", () => { cross.setAttribute("opacity", 0); hideTooltip(); });
  }

  // macro panel — an arbitrary number of series, all sharing one Y-axis,
  // aligned onto the first series' dates.
  (function () {
    const macroCfg = cfg.macroPanel;
    const mount = drawPanel(macroCfg.title);
    const baseSeries = macroCfg.series[0];
    const dates = data.macro[baseSeries.key].map((d) => d.date).filter((d) => d >= START);
    const seriesValues = macroCfg.series.map((s) => {
      const byDate = new Map(data.macro[s.key].map((d) => [d.date, d.value]));
      return dates.map((d) => (byDate.has(d) ? byDate.get(d) : null));
    });
    // Single niceTicks call — see line_chart.js for why calling it twice
    // (once on the raw max, again on that result) can flip the step size at
    // certain boundary values and render a tick off the top of the chart.
    const macroTicks = niceTicks(0, Math.max(...seriesValues.flat().filter((v) => v != null)), 4);
    const yMax = macroTicks[macroTicks.length - 1];
    const svg = el("svg", { viewBox: "0 0 " + W + " " + H, width: W, height: H }, mount);
    drawAxes(svg, dates, macroTicks, yMax, (v) => v);
    macroCfg.series.forEach((s, i) => linePath(svg, dates, seriesValues[i], yMax, colorVar(s.color), 2, null));
    hoverLayer(svg, dates, macroCfg.series.map((s, i) => ({
      label: s.label,
      color: colorVar(s.color),
      values: seriesValues[i],
      fmt: (v) => v.toFixed(s.valueDecimals == null ? 1 : s.valueDecimals) + (s.valueSuffix || ""),
    })), yMax);
  })();

  occPanels.forEach((p) => {
    const mount = drawPanel(p.title);
    const rows = data[p.key].filter((d) => d.date >= START);
    const dates = rows.map((d) => d.date);
    const raw = rows.map((d) => d.value);
    const smoothed = rollingMeanCentered(raw, 5);

    let panelTicks, panelYMax;
    if (data.sharedYAxis) {
      panelTicks = sharedOccTicks;
      panelYMax = sharedOccYMax;
    } else {
      panelTicks = niceTicks(0, Math.max(...raw), 4);
      panelYMax = panelTicks[panelTicks.length - 1];
    }

    const svg = el("svg", { viewBox: "0 0 " + W + " " + H, width: W, height: H }, mount);
    drawAxes(svg, dates, panelTicks, panelYMax, formatCountShort);
    linePath(svg, dates, raw, panelYMax, "var(--ink-muted)", 1.5, "4 3");
    linePath(svg, dates, smoothed, panelYMax, "var(--cat-3)", 2, null);
    hoverLayer(svg, dates, [
      { label: "Smoothed", color: "var(--cat-3)", values: smoothed, fmt: (v) => formatCount(v) },
      { label: "Raw count", color: "var(--ink-muted)", values: raw, fmt: (v) => formatCount(v) },
    ], panelYMax);
  });

  const macroByDate = cfg.macroPanel.series.map((s) => new Map(data.macro[s.key].map((d) => [d.date, d.value])));
  const occByDate = occPanels.map((p) => new Map(data[p.key].map((d) => [d.date, d.value])));
  const tableDates = data[occPanels[0].key].filter((d) => d.date >= START).map((d) => d.date);
  const tableCols = ["Date", ...cfg.macroPanel.series.map((s) => s.label), ...occPanels.map((p) => p.title)];
  const tableRows = tableDates.map((d) => [
    d,
    ...macroByDate.map((m, i) => (m.has(d) ? m.get(d).toFixed(cfg.macroPanel.series[i].valueDecimals == null ? 1 : cfg.macroPanel.series[i].valueDecimals) : "")),
    ...occByDate.map((m) => (m.has(d) ? formatCount(m.get(d)) : "")),
  ]);
  registerDownload("sm", cfg.downloadFilename, tableCols, tableRows);
}

renderSmallMultiples();
wireDownloadButtons();

})();
</script>
