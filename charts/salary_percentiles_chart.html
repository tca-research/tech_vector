<title>Tech Vector — salary distribution by tech role</title>
<style>
:root {
  --surface: #ffffff;
  --surface-alt: #f7f5f8;
  --ink-primary: #18151d;
  --ink-secondary: #4d4954;
  --ink-muted: #8b8792;
  --grid: #e8e6ea;
  --axis: #c7c3cb;
  --card-border: #ece9ee;

  --cat-1: #EC3E9E; --cat-1-text: #A8256C;
  --cat-2: #E0904A; --cat-2-text: #9C5716;
  --cat-3: #5B9BE0; --cat-3-text: #22589C;
  --cat-4: #5A3A9E; --cat-4-text: #4A2E85;
  --cat-5: #D998D0; --cat-5-text: #953F85;
  --cat-5-tint: #F8EEF6;

  /* Status (not categorical) — reserved for "target met" state, never used
     for series/identity. */
  --status-good: #1B7A43;
  --status-good-bg: #E3F5EA;

  /* KPI card (gauge) title/value brand colors. */
  --kpi-title: #DC389D;
  --kpi-value: #7D01E4;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  /* Matches figure.chart-card's own background (not --surface-alt) so any
     leftover space below the card — a browser window or iframe taller than
     the actual content, e.g. before a parent page applies the postMessage
     resize height — reads as plain white, not a visibly mismatched grey band. */
  background: var(--surface);
  color: var(--ink-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.page { margin: 0; padding: 0; }

figure.chart-card {
  position: relative;
  margin: 0;
  background: var(--surface);
  padding: 16px 18px 12px;
  overflow: hidden;
}
.chart-title { font-size: 17px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
.chart-caption { font-size: 13.5px; color: var(--ink-secondary); line-height: 1.55; margin: 0 0 16px; max-width: 900px; }
.chart-caption b { color: var(--ink-primary); }

.legend-row { display: flex; flex-wrap: wrap; gap: 16px 22px; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-secondary); }
.legend-swatch { width: 11px; height: 11px; border-radius: 50%; flex: none; }
.legend-swatch.line { width: 16px; height: 3px; border-radius: 2px; }
.legend-remove {
  font: inherit; font-size: 14px; line-height: 1; border: none; background: transparent;
  color: var(--ink-muted); cursor: pointer; padding: 0;
}
.legend-remove:hover { color: var(--ink-primary); }

.series-search { position: relative; display: inline-block; width: 100%; max-width: 340px; }
.series-search-input {
  font: inherit; font-size: 14px; width: 100%;
  padding: 9px 12px; border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--surface-alt); color: var(--ink-primary);
}
.series-search-input:focus { outline: 2px solid var(--cat-3); outline-offset: 1px; }
.series-suggestions {
  display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 20;
  max-height: 220px; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--card-border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14); padding: 6px;
}
.series-suggestions.open { display: block; }
.series-suggestion { padding: 7px 8px; border-radius: 6px; font-size: 13.5px; color: var(--ink-primary); cursor: pointer; }
.series-suggestion:hover { background: var(--surface-alt); }
.series-suggestion.disabled { color: var(--ink-muted); cursor: default; }

.chart-mount { width: 100%; }
.chart-mount svg { width: 100%; height: auto; display: block; overflow: visible; }

.chart-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--card-border); flex-wrap: wrap; }
.chart-source { font-size: 12px; color: var(--ink-muted); }
.download-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font: inherit; font-size: 12.5px; font-weight: 600; color: var(--ink-secondary);
  background: var(--surface-alt); border: 1px solid var(--card-border); border-radius: 7px;
  padding: 5px 11px; cursor: pointer;
}
.download-btn:hover { color: var(--ink-primary); border-color: var(--axis); }
.download-btn svg { width: 13px; height: 13px; flex: none; }

.filter-row { margin-bottom: 16px; }
.filter-note { font-size: 12px; color: var(--ink-muted); margin: 8px 0 0; }

.filter-select {
  font: inherit; font-size: 14px; min-width: 240px;
  padding: 9px 34px 9px 12px; border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--surface-alt); color: var(--ink-primary); cursor: pointer;
}
.filter-select:focus { outline: 2px solid var(--cat-3); outline-offset: 1px; }

.multiselect { position: relative; display: inline-block; }
.multiselect-button {
  font: inherit; font-size: 14px; display: flex; align-items: center; gap: 10px;
  justify-content: space-between; min-width: 240px;
  padding: 9px 12px; border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--surface-alt); color: var(--ink-primary); cursor: pointer;
}
.multiselect-button:focus { outline: 2px solid var(--cat-3); outline-offset: 1px; }
.multiselect-button .chevron { color: var(--ink-muted); font-size: 11px; flex: none; }
.multiselect-panel {
  display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 20;
  min-width: 260px; max-height: 280px; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--card-border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14); padding: 6px;
}
.multiselect-panel.open { display: block; }
.multiselect-option {
  display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 6px;
  font-size: 13.5px; color: var(--ink-primary); cursor: pointer;
}
.multiselect-option:hover { background: var(--surface-alt); }
.multiselect-option:has(input:disabled) { color: var(--ink-muted); cursor: not-allowed; }
.multiselect-option input:disabled { cursor: not-allowed; }

/* Fixed regardless of description length (1 vs. 2 lines) so gauges shown
   side by side (e.g. as separate iframes on the live site) resize to the
   same height and align, rather than each fitting only its own content. */
.kpi-card { max-width: 420px; min-height: 156px; }
.kpi-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.kpi-icon { flex: none; width: 28px; height: 28px; }
.kpi-icon svg { width: 100%; height: 100%; display: block; }
.kpi-title { font-size: 19px; font-weight: 700; color: var(--kpi-title); margin: 0; }
.kpi-value-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.kpi-value { font-size: 52px; font-weight: 800; line-height: 1; color: var(--kpi-value); }
.kpi-pill {
  display: inline-block; font-size: 13px; font-weight: 700; padding: 5px 12px;
  border-radius: 999px; color: var(--ink-secondary); background: var(--surface-alt);
}
.kpi-pill.kpi-pill--good { color: var(--status-good); background: var(--status-good-bg); }
#kpi-description { max-width: none; }

.status-row { display: flex; gap: 36px; flex-wrap: wrap; }
.status-item { display: flex; flex-direction: column; gap: 4px; }
.status-label { font-size: 12px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; color: var(--ink-muted); }
.status-value { font-size: 22px; font-weight: 700; color: var(--ink-primary); }

.ranked-bar-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
.dropdown-label { font-size: 13px; color: var(--ink-secondary); display: flex; align-items: center; gap: 8px; }

.tab-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.tab-btn {
  font: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer;
  padding: 10px 18px; border-radius: 999px; border: 1px solid var(--cat-4);
  background: var(--surface); color: var(--cat-4-text);
}
.tab-btn.active { background: var(--cat-4); color: #fff; border-color: var(--cat-4); }

.small-multiples-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 22px 18px;
}
/* min-height reserves space for 2 lines regardless of how a given panel's
   title actually wraps at the current column width — same fix pattern as
   .kpi-card's min-height above. Without it, a panel with a short one-line
   title starts its chart-mount higher than neighbors whose longer title
   wraps to 2 lines, so the plotted charts (and their bottom edges) don't
   line up across the row. */
.sm-panel-title { font-size: 13px; font-weight: 700; line-height: 1.3; margin: 0 0 6px; min-height: 34px; }

.stacked-sm-panels { display: flex; flex-direction: column; gap: 20px; }
.stacked-sm-panel svg { display: block; width: 100%; height: auto; }

.dual-panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.dual-panel svg { display: block; width: 100%; height: auto; }
@media (max-width: 640px) { .dual-panel-grid { grid-template-columns: 1fr; } }

.reference-list { margin: 0; padding-left: 20px; }
.reference-item { font-size: 13.5px; line-height: 1.6; color: var(--ink-primary); margin-bottom: 10px; }
.reference-item em { font-style: italic; }
.reference-item a { color: var(--cat-4-text); }

.tooltip {
  /* top/left: 0 are load-bearing, not decorative defaults — showTooltip()
     positions this element purely via a "translate(x,y)" transform, on the
     assumption that (x,y) is a viewport-absolute offset. But a
     position:fixed element with top/left left at their "auto" default is
     anchored to its own static in-flow position (here, wherever this div
     falls in the page after all the preceding chart content) and the
     transform then offsets from THAT point, not from the viewport's
     top-left corner — so without an explicit 0/0 anchor the tooltip renders
     however far down the page its DOM position happens to be, plus the
     intended offset, i.e. far below the cursor on any page with real
     content above this div. */
  position: fixed; top: 0; left: 0; pointer-events: none; z-index: 50;
  background: var(--ink-primary); color: var(--surface);
  font-size: 12.5px; line-height: 1.45; border-radius: 8px;
  padding: 8px 10px; box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  opacity: 0; transform: translate(-9999px, -9999px);
  transition: opacity 0.08s ease-out;
  max-width: 280px;
}
.tooltip.visible { opacity: 1; }
/* Labels wrap and values never do — not the other way around. A blanket
   nowrap on .tt-row (the old rule) means a long label + its value can't
   both fit inside max-width, and since flex items refuse to shrink below
   their own content size by default, the value (pushed right by
   margin-left:auto) rendered outside the tooltip's dark background instead
   of wrapping or being clipped, e.g. "Business & Data Analysts". */
.tooltip .tt-value { font-weight: 700; white-space: nowrap; flex: none; }
.tooltip .tt-row { display: flex; align-items: center; gap: 6px; }
.tooltip .tt-label { flex: 1 1 auto; min-width: 0; overflow-wrap: break-word; }
.tooltip .tt-key { width: 10px; height: 2px; border-radius: 1px; flex: none; }
.tooltip .tt-title { font-weight: 700; margin-bottom: 4px; opacity: 0.85; }

.bar-annotation {
  box-sizing: border-box; height: 100%; display: flex; align-items: center;
  font-size: 12px; line-height: 1.5; color: var(--ink-secondary);
  background: var(--cat-5-tint); border-radius: 8px; padding: 8px 10px;
}

.end-label { font-weight: 700; font-size: 12.5px; }
.axis-label { fill: var(--ink-muted); font-size: 11.5px; }
.grid-line { stroke: var(--grid); stroke-width: 1; }
.axis-line { stroke: var(--axis); stroke-width: 1; }

/* No chart ever hangs a listener on an SVG <text> — hit-testing always goes
   through a dedicated invisible rect/circle drawn separately. But value
   labels drawn *inside* a bar/segment (e.g. vertical_bar.js, the "labelInside"
   branch of percentile_bar.js, drawStackedBarSegments' in-bar % labels) paint
   on top of that hit target and, being real painted content, still swallow
   the pointer event themselves — so hovering directly over the printed
   number showed no tooltip at all. Blanket pointer-events:none on chart text
   makes every hit target reachable through its own labels, everywhere. */
svg text { pointer-events: none; }

@media (max-width: 640px) {
  figure.chart-card { padding: 12px 12px 10px; }
  .legend-row { gap: 10px 16px; }
}

</style>

// Applies the title/source/caption fields every chart's Python config
// carries, so per-dataset text lives in build_charts.py only — none of it

function colorVar(token) {

}
function colorTextVar(token) {

function applyChromeConfig(cfg) {
  if (cfg.pageTitle) document.title = cfg.pageTitle;
  const titleEl = document.getElementById("chart-title");
  if (titleEl) titleEl.textContent = cfg.title || "";
  const sourceEl = document.getElementById("chart-source");
  if (sourceEl) {
    // Strip any trailing period a config's source string already ends with —
    // whether or not it does is a config-authoring detail, not something
    // this join logic should have to know about — so "Chart last updated"
    // never ends up double-punctuated ("Australia.. Chart last updated...").
    let text = (cfg.source || "").replace(/\.+\s*$/, "");
    if (cfg.lastUpdated) {
      text += (text ? ". " : "") + "Chart last updated on " + cfg.lastUpdated + ".";
    } else if (text) {
      text += ".";

    sourceEl.textContent = text;
  }

function niceStep(rawStep) {
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep / mag;
  let step;
  if (norm < 1.5) step = 1;
  else if (norm < 3) step = 2;

  else step = 10;
  return step * mag;
}

  const step = niceStep((max - min) / count || 1);
  const start = Math.floor(min / step) * step;
  const end = Math.ceil(max / step) * step;
  const ticks = [];
  for (let v = start; v <= end + step * 1e-6; v += step) ticks.push(Math.round(v * 1e6) / 1e6);

}

    const hi = Math.min(values.length - 1, i + half);
    let sum = 0, n = 0;
    for (let j = lo; j <= hi; j++) {

function assertIsoDate(d) {

const tooltipEl = document.getElementById("tooltip");
function showTooltip(x, y, html) {

  const pad = 14;
  let left = x + pad, top = y + pad;
  const rect = tooltipEl.getBoundingClientRect();
  if (left + rect.width > window.innerWidth - 8) left = x - rect.width - pad;
  if (top + rect.height > window.innerHeight - 8) top = y - rect.height - pad;
  tooltipEl.style.transform = "translate(" + left + "px," + top + "px)";
}

// A tap alone (no drag) never fires "pointermove" — it's just pointerdown ->
// pointerup with no movement — so every chart's hover-driven tooltip was
// invisible on touch devices. bindTooltipHover adds pointerdown as a second
// trigger for touch, and skips the pointerleave auto-hide for touch (its
// transient pointer fires pointerleave right after pointerup as part of
// lifting the finger, which isn't the user asking to dismiss anything, and
// would otherwise hide the tooltip before it's ever seen). A capture-phase
// listener below dismisses the currently-open one on the next tap anywhere
// else, since touch has no equivalent of "the mouse moved away".
let activeTouchDismiss = null;
function bindTooltipHover(el, onMove, onLeave) {
  el.addEventListener("pointermove", onMove);
  el.addEventListener("pointerleave", (ev) => {
    if (ev.pointerType === "touch") return;
    onLeave();

    if (ev.pointerType !== "touch") return;

function ttRow(color, label, value) {
  const row = document.createElement("div");
  row.className = "tt-row";
  if (color) {
    const key = document.createElement("span");
    key.className = "tt-key";
    key.style.background = color;
    row.appendChild(key);
  }
  const lab = document.createElement("span");
  lab.className = "tt-label";
  lab.textContent = label;
  row.appendChild(lab);
  if (value !== undefined) {
    const val = document.createElement("span");
    val.className = "tt-value";
    val.style.marginLeft = "auto";

// onRemove is optional — pass it to turn the legend item into a removable
// chip (a small × button after the label), used by a searchable series
// filter where the legend doubles as the "currently shown" list.
function legendItem(container, color, label, lineStyle, onRemove) {
  const item = document.createElement("div");
  item.className = "legend-item";
  const sw = document.createElement("span");
  sw.className = "legend-swatch" + (lineStyle ? " line" : "");
  sw.style.background = color;
  item.appendChild(sw);
  const lab = document.createElement("span");
  lab.textContent = label;
  item.appendChild(lab);
  if (onRemove) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "legend-remove";
    btn.setAttribute("aria-label", "Remove " + label);
    btn.textContent = "×";
    btn.addEventListener("click", onRemove);
    item.appendChild(btn);
  }

// ---------- stacked-bar helpers (used by stacked_bar.js and any small-
// multiples variant that stacks the same Men/Women-style segments) --------
function roundedRectPath(x, y, w, h, r) {
  return "M " + (x + r.tl) + " " + y +
    " H " + (x + w - r.tr) +
    " A " + r.tr + " " + r.tr + " 0 0 1 " + (x + w) + " " + (y + r.tr) +
    " V " + (y + h - r.br) +
    " A " + r.br + " " + r.br + " 0 0 1 " + (x + w - r.br) + " " + (y + h) +
    " H " + (x + r.bl) +
    " A " + r.bl + " " + r.bl + " 0 0 1 " + x + " " + (y + h - r.bl) +
    " V " + (y + r.tl) +
    " A " + r.tl + " " + r.tl + " 0 0 1 " + (x + r.tl) + " " + y +
    " Z";
}
// Draws one 100%-stacked row of `series` segments (each { column, label,
// color }) sized from `values[column]` (0-100), from x0 to x0+plotW. Returns
// the row's formatted values, in series order, for CSV export.
function drawStackedBarSegments(svg, x0, y, plotW, barH, series, values, tooltipTitle) {
  let cursor = x0;
  const tableRow = [];
  series.forEach((s, si) => {
    const val = values[s.column];
    const w = (val / 100) * plotW;
    const isFirst = si === 0;
    const isLast = si === series.length - 1;
    const r = 4;
    const radii = { tl: isFirst ? r : 0, bl: isFirst ? r : 0, tr: isLast ? r : 0, br: isLast ? r : 0 };
    const color = colorVar(s.color);
    if (w > 0.5) {
      const path = roundedRectPath(cursor, y, w, barH, radii);
      const seg = el("path", { d: path, fill: color }, svg);
      const hit = el("rect", { x: cursor, y: y - 2, width: w, height: barH + 4, fill: "transparent" }, svg);
      const valueLabel = (Math.round(val * 10) / 10) + "%";
      [seg, hit].forEach((node) => {
        node.style.cursor = "pointer";
        bindTooltipHover(node, (ev) => {
          seg.style.filter = "brightness(1.08)";
          showTooltip(ev.clientX, ev.clientY, ttBox(tooltipTitle, [ttRow(color, s.label, valueLabel)]));
        }, () => { seg.style.filter = ""; hideTooltip(); });
      });
      if (w > 36) {
        textEl(cursor + w / 2, y + barH / 2 + 4, valueLabel, { "text-anchor": "middle", "font-size": "12", "font-weight": "700", fill: "#fff" }, svg);
      } else {
        textEl(cursor + w + 6, y + barH / 2 + 4, valueLabel, { "font-size": "12", "font-weight": "700", fill: colorTextVar(s.color) }, svg);
      }
      tableRow.push(valueLabel);
    } else {

}

function sendIframeHeight() {
  if (window.parent === window) return; // not embedded — nothing to do
  window.parent.postMessage({ type: "iframeHeight", height: document.documentElement.scrollHeight }, "*");
}
window.addEventListener("load", sendIframeHeight);
window.addEventListener("resize", sendIframeHeight);
if (typeof ResizeObserver !== "undefined") {
  new ResizeObserver(sendIframeHeight).observe(document.body);
}


// PERCENTILE BAR — one horizontal bar per salary percentile (90th/75th/
// Median/25th), filtered by a Job Title dropdown and a Level dropdown. All
// dataset-specific values come from DATA.percentile.config, built in
// build_charts.py's PERCENTILE_BAR_CONFIG.
function renderPercentileBar() {
  const cfg = DATA.percentile.config;
  const data = DATA.percentile.data;
  applyChromeConfig(cfg);

  const fmt = cfg.valueFormat || {};
  const formatValue = (v) => (fmt.prefix || "") + Math.round(v / (fmt.divisor || 1)).toLocaleString("en-AU") + (fmt.suffix || "");

  const controls = document.getElementById("percentile-controls");
  const mount = document.getElementById("percentile-chart");
  controls.innerHTML = "";

  const jobTitles = Array.from(new Set(data.map((d) => d.jobTitle))).sort();
  let activeJobTitle = cfg.defaultJobTitle && jobTitles.includes(cfg.defaultJobTitle) ? cfg.defaultJobTitle : jobTitles[0];
  let activeLevel = cfg.defaultLevel || cfg.levelOptions[0].value;

  const jobLabel = document.createElement("label");
  jobLabel.className = "dropdown-label";
  jobLabel.textContent = cfg.jobTitleDropdownLabel || "Job Title:";
  const jobSelect = document.createElement("select");
  jobSelect.className = "filter-select";
  jobTitles.forEach((name) => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    jobSelect.appendChild(opt);
  });
  jobSelect.value = activeJobTitle;
  jobSelect.addEventListener("change", () => { activeJobTitle = jobSelect.value; draw(); });
  jobLabel.appendChild(jobSelect);

  const levelLabel = document.createElement("label");
  levelLabel.className = "dropdown-label";
  levelLabel.textContent = cfg.levelDropdownLabel || "Level:";
  const levelSelect = document.createElement("select");
  levelSelect.className = "filter-select";
  cfg.levelOptions.forEach((o) => {
    const opt = document.createElement("option");
    opt.value = o.value;
    opt.textContent = o.label;
    levelSelect.appendChild(opt);
  });
  levelSelect.value = activeLevel;
  levelSelect.addEventListener("change", () => { activeLevel = levelSelect.value; draw(); });
  levelLabel.appendChild(levelSelect);

  controls.appendChild(jobLabel);
  controls.appendChild(levelLabel);

  const W = 900, labelW = 90, rightPad = 60, topPad = 10, rowH = 46, bottomPad = 34;
  const color = colorVar(cfg.barColor || "cat-3");

  function draw() {
    const byPercentile = {};
    data
      .filter((d) => d.jobTitle === activeJobTitle && d.level === activeLevel)
      .forEach((d) => { byPercentile[d.percentile] = d.value; });
    const rows = cfg.percentileOrder
      .filter((p) => byPercentile[p] != null)
      .map((p) => ({ percentile: p, value: byPercentile[p] }));

    const H = topPad + rows.length * rowH + bottomPad;
    const plotW = W - labelW - rightPad;
    mount.innerHTML = "";
    const svg = el("svg", { viewBox: "0 0 " + W + " " + H, width: W, height: H }, mount);

    if (!rows.length) {
      textEl(W / 2, H / 2, "No data for this combination.", { "text-anchor": "middle", class: "axis-label" }, svg);
      registerDownload("percentile", cfg.downloadFilename, ["Percentile", "Salary"], []);
      return;
    }

    const maxVal = Math.max(...rows.map((d) => d.value));
    const ticks = niceTicks(0, maxVal * 1.15, 6);
    const xMax = ticks[ticks.length - 1];
    const x = (v) => (v / xMax) * plotW;
    const plotBottom = topPad + rows.length * rowH;

    ticks.forEach((t) => {
      const gx = labelW + x(t);
      el("line", { class: "grid-line", x1: gx, x2: gx, y1: topPad - 4, y2: plotBottom }, svg);
      textEl(gx, plotBottom + 20, formatValue(t), { class: "axis-label", "text-anchor": "middle" }, svg);
    });
    el("line", { class: "axis-line", x1: labelW, x2: labelW, y1: topPad - 4, y2: plotBottom }, svg);

    const barH = 28;
    const tableRows = [];
    rows.forEach((d, i) => {
      const rowY = topPad + i * rowH + (rowH - barH) / 2;
      textEl(labelW - 14, rowY + barH / 2 + 4, d.percentile, { "text-anchor": "end", "font-size": "13", "font-weight": "700", fill: "var(--ink-primary)" }, svg);
      const w = Math.max(2, x(d.value));
      const r = 4;
      const path = "M " + labelW + " " + rowY +
        " H " + (labelW + Math.max(w - r, r)) +
        " A " + r + " " + r + " 0 0 1 " + (labelW + w) + " " + (rowY + r) +
        " V " + (rowY + barH - r) +
        " A " + r + " " + r + " 0 0 1 " + (labelW + Math.max(w - r, r)) + " " + (rowY + barH) +
        " H " + labelW + " Z";
      const bar = el("path", { d: path, fill: color }, svg);
      const hit = el("rect", { x: labelW, y: rowY - 2, width: Math.max(w, 6), height: barH + 4, fill: "transparent" }, svg);
      const valueLabel = formatValue(d.value);
      [bar, hit].forEach((node) => {
        node.style.cursor = "pointer";
        bindTooltipHover(node, (ev) => {
          bar.style.filter = "brightness(1.1)";
          showTooltip(ev.clientX, ev.clientY, ttBox(activeJobTitle + " — " + activeLevel, [ttRow(color, d.percentile, valueLabel)]));
        }, () => { bar.style.filter = ""; hideTooltip(); });
      });
      const labelInside = w > 60;
      textEl(
        labelInside ? labelW + w - 10 : labelW + w + 8,
        rowY + barH / 2 + 4,
        valueLabel,
        { "text-anchor": labelInside ? "end" : "start", "font-size": "13", "font-weight": "700", fill: labelInside ? "#fff" : colorTextVar(cfg.barColor || "cat-3") },
        svg
      );
      tableRows.push([d.percentile, valueLabel]);
    });

    registerDownload("percentile", cfg.downloadFilename, ["Percentile", "Salary"], tableRows);
  }

  draw();
}

renderPercentileBar();
wireDownloadButtons();

})();
</script>
