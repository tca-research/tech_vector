<title>Tech Vector — employment by occupation</title>
<style>
:root {
  --surface: #ffffff;
  --surface-alt: #f7f5f8;
  --ink-primary: #18151d;
  --ink-secondary: #4d4954;
  --ink-muted: #8b8792;
  --grid: #e8e6ea;
  --axis: #c7c3cb;
  --card-border: #ece9ee;

  --cat-1: #EC3E9E; --cat-1-text: #A8256C;
  --cat-2: #E0904A; --cat-2-text: #9C5716;
  --cat-3: #5B9BE0; --cat-3-text: #22589C;
  --cat-4: #5A3A9E; --cat-4-text: #4A2E85;
  --cat-5: #D998D0; --cat-5-text: #953F85;
  --cat-5-tint: #F8EEF6;
  --corner-accent: #C93FB0;

  /* Status (not categorical) — reserved for "target met" state, never used
     for series/identity. */
  --status-good: #1B7A43;
  --status-good-bg: #E3F5EA;

  /* KPI card (gauge) title/value brand colors. */
  --kpi-title: #DC389D;
  --kpi-value: #7D01E4;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  /* Matches figure.chart-card's own background (not --surface-alt) so any
     leftover space below the card — a browser window or iframe taller than
     the actual content, e.g. before a parent page applies the postMessage
     resize height — reads as plain white, not a visibly mismatched grey band. */
  background: var(--surface);
  color: var(--ink-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.page { margin: 0; padding: 0; }

figure.chart-card {
  position: relative;
  margin: 0;
  background: var(--surface);
  padding: 16px 18px 12px;
  overflow: hidden;
}
figure.chart-card::after {
  content: "";
  position: absolute; right: -1px; bottom: -1px;
  width: 46px; height: 46px;
  background: var(--corner-accent);
  clip-path: polygon(100% 0, 0% 100%, 100% 100%);
  opacity: 0.9;
}
.chart-title { font-size: 17px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
.chart-caption { font-size: 13.5px; color: var(--ink-secondary); line-height: 1.55; margin: 0 0 16px; max-width: 900px; }
.chart-caption b { color: var(--ink-primary); }

.legend-row { display: flex; flex-wrap: wrap; gap: 16px 22px; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-secondary); }
.legend-swatch { width: 11px; height: 11px; border-radius: 50%; flex: none; }
.legend-swatch.line { width: 16px; height: 3px; border-radius: 2px; }
.legend-remove {
  font: inherit; font-size: 14px; line-height: 1; border: none; background: transparent;
  color: var(--ink-muted); cursor: pointer; padding: 0;
}
.legend-remove:hover { color: var(--ink-primary); }

.series-search { position: relative; display: inline-block; width: 100%; max-width: 340px; }
.series-search-input {
  font: inherit; font-size: 14px; width: 100%;
  padding: 9px 12px; border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--surface-alt); color: var(--ink-primary);
}
.series-search-input:focus { outline: 2px solid var(--cat-3); outline-offset: 1px; }
.series-suggestions {
  display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 20;
  max-height: 220px; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--card-border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14); padding: 6px;
}
.series-suggestions.open { display: block; }
.series-suggestion { padding: 7px 8px; border-radius: 6px; font-size: 13.5px; color: var(--ink-primary); cursor: pointer; }
.series-suggestion:hover { background: var(--surface-alt); }
.series-suggestion.disabled { color: var(--ink-muted); cursor: default; }

.chart-mount { width: 100%; }
.chart-mount svg { width: 100%; height: auto; display: block; overflow: visible; }

.chart-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--card-border); flex-wrap: wrap; }
.chart-source { font-size: 12px; color: var(--ink-muted); }
.download-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font: inherit; font-size: 12.5px; font-weight: 600; color: var(--ink-secondary);
  background: var(--surface-alt); border: 1px solid var(--card-border); border-radius: 7px;
  padding: 5px 11px; cursor: pointer;
}
.download-btn:hover { color: var(--ink-primary); border-color: var(--axis); }
.download-btn svg { width: 13px; height: 13px; flex: none; }

.filter-row { margin-bottom: 16px; }
.filter-note { font-size: 12px; color: var(--ink-muted); margin: 8px 0 0; }

.filter-select {
  font: inherit; font-size: 14px; min-width: 240px;
  padding: 9px 34px 9px 12px; border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--surface-alt); color: var(--ink-primary); cursor: pointer;
}
.filter-select:focus { outline: 2px solid var(--cat-3); outline-offset: 1px; }

.multiselect { position: relative; display: inline-block; }
.multiselect-button {
  font: inherit; font-size: 14px; display: flex; align-items: center; gap: 10px;
  justify-content: space-between; min-width: 240px;
  padding: 9px 12px; border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--surface-alt); color: var(--ink-primary); cursor: pointer;
}
.multiselect-button:focus { outline: 2px solid var(--cat-3); outline-offset: 1px; }
.multiselect-button .chevron { color: var(--ink-muted); font-size: 11px; flex: none; }
.multiselect-panel {
  display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 20;
  min-width: 260px; max-height: 280px; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--card-border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14); padding: 6px;
}
.multiselect-panel.open { display: block; }
.multiselect-option {
  display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 6px;
  font-size: 13.5px; color: var(--ink-primary); cursor: pointer;
}
.multiselect-option:hover { background: var(--surface-alt); }
.multiselect-option:has(input:disabled) { color: var(--ink-muted); cursor: not-allowed; }
.multiselect-option input:disabled { cursor: not-allowed; }

/* Fixed regardless of description length (1 vs. 2 lines) so gauges shown
   side by side (e.g. as separate iframes on the live site) resize to the
   same height and align, rather than each fitting only its own content. */
.kpi-card { max-width: 420px; min-height: 156px; }
.kpi-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.kpi-icon { flex: none; width: 28px; height: 28px; }
.kpi-icon svg { width: 100%; height: 100%; display: block; }
.kpi-title { font-size: 19px; font-weight: 700; color: var(--kpi-title); margin: 0; }
.kpi-value-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.kpi-value { font-size: 52px; font-weight: 800; line-height: 1; color: var(--kpi-value); }
.kpi-pill {
  display: inline-block; font-size: 13px; font-weight: 700; padding: 5px 12px;
  border-radius: 999px; color: var(--ink-secondary); background: var(--surface-alt);
}
.kpi-pill.kpi-pill--good { color: var(--status-good); background: var(--status-good-bg); }
#kpi-description { max-width: none; }

.ranked-bar-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
.dropdown-label { font-size: 13px; color: var(--ink-secondary); display: flex; align-items: center; gap: 8px; }

.tab-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.tab-btn {
  font: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer;
  padding: 10px 18px; border-radius: 999px; border: 1px solid var(--cat-4);
  background: var(--surface); color: var(--cat-4-text);
}
.tab-btn.active { background: var(--cat-4); color: #fff; border-color: var(--cat-4); }

.small-multiples-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 22px 18px;
}
.sm-panel-title { font-size: 13px; font-weight: 700; margin: 0 0 6px; }

.stacked-sm-panels { display: flex; flex-direction: column; gap: 20px; }
.stacked-sm-panel svg { display: block; width: 100%; height: auto; }

.dual-panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.dual-panel svg { display: block; width: 100%; height: auto; }
@media (max-width: 640px) { .dual-panel-grid { grid-template-columns: 1fr; } }

.reference-list { margin: 0; padding-left: 20px; }
.reference-item { font-size: 13.5px; line-height: 1.6; color: var(--ink-primary); margin-bottom: 10px; }
.reference-item em { font-style: italic; }
.reference-item a { color: var(--cat-4-text); }

.tooltip {
  position: fixed; pointer-events: none; z-index: 50;
  background: var(--ink-primary); color: var(--surface);
  font-size: 12.5px; line-height: 1.45; border-radius: 8px;
  padding: 8px 10px; box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  opacity: 0; transform: translate(-9999px, -9999px);
  transition: opacity 0.08s ease-out;
  max-width: 240px;
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-value { font-weight: 700; }
.tooltip .tt-row { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.tooltip .tt-key { width: 10px; height: 2px; border-radius: 1px; flex: none; }
.tooltip .tt-title { font-weight: 700; margin-bottom: 4px; opacity: 0.85; }

.bar-annotation {
  box-sizing: border-box; height: 100%; display: flex; align-items: center;
  font-size: 12px; line-height: 1.5; color: var(--ink-secondary);
  background: var(--cat-5-tint); border-radius: 8px; padding: 8px 10px;
}

.end-label { font-weight: 700; font-size: 12.5px; }
.axis-label { fill: var(--ink-muted); font-size: 11.5px; }
.grid-line { stroke: var(--grid); stroke-width: 1; }
.axis-line { stroke: var(--axis); stroke-width: 1; }

@media (max-width: 640px) {
  figure.chart-card { padding: 12px 12px 10px; }
  .legend-row { gap: 10px 16px; }
}

</style>

      <div id="line-filter-mount"></div>

      <span class="chart-source" id="chart-source"></span>

    </div>
  </figure>
</div>

<script>
(function () {
  "use strict";
  const DATA = JSON.parse(document.getElementById("chart-data").textContent);

const SVGNS = "http://www.w3.org/2000/svg";

// Applies the title/source/caption fields every chart's Python config
// carries, so per-dataset text lives in build_charts.py only — none of it
// is hardcoded in these JS files.
function colorVar(token) {
  return "var(--" + token + ")";
}
function colorTextVar(token) {
  return "var(--" + token + "-text)";
}
function applyChromeConfig(cfg) {
  if (cfg.pageTitle) document.title = cfg.pageTitle;
  const titleEl = document.getElementById("chart-title");
  if (titleEl) titleEl.textContent = cfg.title || "";
  const sourceEl = document.getElementById("chart-source");
  if (sourceEl) {
    // Strip any trailing period a config's source string already ends with —
    // whether or not it does is a config-authoring detail, not something
    // this join logic should have to know about — so "Chart last updated"
    // never ends up double-punctuated ("Australia.. Chart last updated...").
    let text = (cfg.source || "").replace(/\.+\s*$/, "");
    if (cfg.lastUpdated) {
      text += (text ? ". " : "") + "Chart last updated on " + cfg.lastUpdated + ".";
    } else if (text) {
      text += ".";
    }
    sourceEl.textContent = text;
  }
  const captionEl = document.getElementById("chart-caption");
  if (captionEl && cfg.caption) captionEl.textContent = cfg.caption;
}

// ---------- generic helpers ----------------------------------------------
function el(tag, attrs, parent) {
  const n = document.createElementNS(SVGNS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(n);
  return n;
}
function textEl(x, y, str, attrs, parent) {
  const t = el("text", Object.assign({ x, y }, attrs), parent);
  t.textContent = str; // untrusted-safe: textContent, never innerHTML
  return t;
}
function niceStep(rawStep) {
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep / mag;
  let step;
  if (norm < 1.5) step = 1;
  else if (norm < 3) step = 2;
  else if (norm < 7) step = 5;
  else step = 10;
  return step * mag;
}
function niceTicks(min, max, count) {
  const step = niceStep((max - min) / count || 1);
  const start = Math.floor(min / step) * step;
  const end = Math.ceil(max / step) * step;
  const ticks = [];
  for (let v = start; v <= end + step * 1e-6; v += step) ticks.push(Math.round(v * 1e6) / 1e6);
  return ticks;
}

  return "$" + Math.round(v / 1000) + "K";
}
function formatCount(v) {
  return Math.round(v).toLocaleString("en-AU");
}
function formatCountShort(v) {
  // Independent-axis small multiples can have a max well under 1000 (e.g. a
  // ~100-160 range) — dividing everything by 1000 there would print "0K" on
  // every tick, so only use the K suffix once it's actually needed.
  if (Math.abs(v) < 1000) return String(Math.round(v));
  return Math.round(v / 1000) + "K";
}
function rollingMeanCentered(values, window) {
  const half = Math.floor(window / 2);
  return values.map((_, i) => {
    const lo = Math.max(0, i - half);
    const hi = Math.min(values.length - 1, i + half);
    let sum = 0, n = 0;
    for (let j = lo; j <= hi; j++) {
      if (values[j] != null) { sum += values[j]; n++; }
    }
    return n ? sum / n : null;

function monthYearToDate(my) {
  // "August 1986" -> Date
  const [mon, yr] = my.split(" ");

// All date fields in chart-data.json MUST already be ISO "YYYY-MM-DD" or
// "YYYY-MM" strings by the time they reach this page (see DATA_FORMAT.md).
// This guard exists because that exact mistake shipped once already: an
// ABS-style "Aug-06" string handed to `new Date()` silently parses as

function assertIsoDate(d) {

const tooltipEl = document.getElementById("tooltip");
function showTooltip(x, y, html) {
  tooltipEl.innerHTML = "";
  tooltipEl.appendChild(html);
  tooltipEl.classList.add("visible");
  const pad = 14;
  let left = x + pad, top = y + pad;
  const rect = tooltipEl.getBoundingClientRect();
  if (left + rect.width > window.innerWidth - 8) left = x - rect.width - pad;
  if (top + rect.height > window.innerHeight - 8) top = y - rect.height - pad;

    t.className = "tt-title";
    t.textContent = titleText;
    box.appendChild(t);
  }
  rows.forEach((r) => box.appendChild(r));
  return box;
}

// onRemove is optional — pass it to turn the legend item into a removable
// chip (a small × button after the label), used by a searchable series
// filter where the legend doubles as the "currently shown" list.
function legendItem(container, color, label, lineStyle, onRemove) {
  const item = document.createElement("div");
  item.className = "legend-item";
  const sw = document.createElement("span");
  sw.className = "legend-swatch" + (lineStyle ? " line" : "");
  sw.style.background = color;
  item.appendChild(sw);
  const lab = document.createElement("span");
  lab.textContent = label;
  item.appendChild(lab);
  if (onRemove) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "legend-remove";
    btn.setAttribute("aria-label", "Remove " + label);
    btn.textContent = "×";
    btn.addEventListener("click", onRemove);
    item.appendChild(btn);
  }
  container.appendChild(item);
}

// ---------- stacked-bar helpers (used by stacked_bar.js and any small-
// multiples variant that stacks the same Men/Women-style segments) --------
function roundedRectPath(x, y, w, h, r) {
  return "M " + (x + r.tl) + " " + y +
    " H " + (x + w - r.tr) +
    " A " + r.tr + " " + r.tr + " 0 0 1 " + (x + w) + " " + (y + r.tr) +
    " V " + (y + h - r.br) +
    " A " + r.br + " " + r.br + " 0 0 1 " + (x + w - r.br) + " " + (y + h) +
    " H " + (x + r.bl) +
    " A " + r.bl + " " + r.bl + " 0 0 1 " + x + " " + (y + h - r.bl) +
    " V " + (y + r.tl) +
    " A " + r.tl + " " + r.tl + " 0 0 1 " + (x + r.tl) + " " + y +
    " Z";
}
// Draws one 100%-stacked row of `series` segments (each { column, label,
// color }) sized from `values[column]` (0-100), from x0 to x0+plotW. Returns
// the row's formatted values, in series order, for CSV export.
function drawStackedBarSegments(svg, x0, y, plotW, barH, series, values, tooltipTitle) {
  let cursor = x0;
  const tableRow = [];
  series.forEach((s, si) => {
    const val = values[s.column];
    const w = (val / 100) * plotW;
    const isFirst = si === 0;
    const isLast = si === series.length - 1;
    const r = 4;
    const radii = { tl: isFirst ? r : 0, bl: isFirst ? r : 0, tr: isLast ? r : 0, br: isLast ? r : 0 };
    const color = colorVar(s.color);
    if (w > 0.5) {
      const path = roundedRectPath(cursor, y, w, barH, radii);
      const seg = el("path", { d: path, fill: color }, svg);
      const hit = el("rect", { x: cursor, y: y - 2, width: w, height: barH + 4, fill: "transparent" }, svg);
      const valueLabel = (Math.round(val * 10) / 10) + "%";
      [seg, hit].forEach((node) => {
        node.style.cursor = "pointer";
        node.addEventListener("pointermove", (ev) => {
          seg.style.filter = "brightness(1.08)";
          showTooltip(ev.clientX, ev.clientY, ttBox(tooltipTitle, [ttRow(color, s.label, valueLabel)]));
        });
        node.addEventListener("pointerleave", () => { seg.style.filter = ""; hideTooltip(); });
      });
      if (w > 36) {
        textEl(cursor + w / 2, y + barH / 2 + 4, valueLabel, { "text-anchor": "middle", "font-size": "12", "font-weight": "700", fill: "#fff" }, svg);
      } else {
        textEl(cursor + w + 6, y + barH / 2 + 4, valueLabel, { "font-size": "12", "font-weight": "700", fill: colorTextVar(s.color) }, svg);
      }
      tableRow.push(valueLabel);
    } else {
      tableRow.push("0%");
    }
    cursor += w;
  });
  return tableRow;
}

// csv download — replaces the table-view toggle with a direct data export
const downloadRegistry = {};
function csvCell(v) {
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function registerDownload(key, filename, columns, rows) {
  const csv = [columns, ...rows].map((r) => r.map(csvCell).join(",")).join("\r\n");
  downloadRegistry[key] = { filename, csv };
}
function wireDownloadButtons() {
  document.querySelectorAll(".download-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const entry = downloadRegistry[btn.dataset.target];
      if (!entry) return;
      const blob = new Blob([entry.csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = entry.filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
  });
}

// iframe auto-resize — lets a parent page embedding this chart in an
// <iframe> size that iframe to fit the chart's actual rendered height
// (figure.chart-card has no min-height, so scrollHeight reflects real
// content). Sent on load, on window resize, and whenever the rendered
// height itself changes (dropdown/search interactions, responsive reflow).
function sendIframeHeight() {
  if (window.parent === window) return; // not embedded — nothing to do
  window.parent.postMessage({ type: "iframeHeight", height: document.documentElement.scrollHeight }, "*");
}
window.addEventListener("load", sendIframeHeight);
window.addEventListener("resize", sendIframeHeight);
if (typeof ResizeObserver !== "undefined") {
  new ResizeObserver(sendIframeHeight).observe(document.body);
}


// INTERACTIVE LINE CHART — single or multi-select filter, direct end labels, crosshair
// All dataset-specific values (default series, filter mode, palette,
// formatting, text) come from DATA.interactiveLine.config, built in
// build_charts.py's INTERACTIVE_LINE_CONFIG.
function renderInteractiveLine() {
  const cfg = DATA.interactiveLine.config;
  const data = DATA.interactiveLine.data;
  applyChromeConfig(cfg);

  const fmt = cfg.valueFormat || {};
  const formatShort = (v) => {
    if (Math.abs(v) < (fmt.divisor || 1000)) return String(Math.round(v));
    return Math.round(v / (fmt.divisor || 1000)) + (fmt.suffix || "");
  };
  const formatFull = (v) => Math.round(v).toLocaleString("en-AU");

  const allSeries = Object.keys(data.series);
  const palette = cfg.palette.map(colorVar);
  const mount = document.getElementById("line-chart");
  const note = document.getElementById("line-filter-note");
  const filterMount = document.getElementById("line-filter-mount");

  const W = 900, H = 440, padL = 56, padR = 132, padT = 16, padB = 46;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const dates = data.dates.map(monthYearToDate);
  const x = (d) => padL + ((d.getTime() - dates[0].getTime()) / (dates[dates.length - 1].getTime() - dates[0].getTime())) * plotW;

  // Colors are assigned per-series to a fixed palette "slot" and held there
  // for as long as that series stays selected — never reassigned by
  // position in the current selection. Otherwise unchecking one series
  // would repaint the others, which breaks "color follows the entity, not
  // its rank" the moment a user toggles anything.
  const seriesColor = new Map();
  function assignColor(name) {
    if (seriesColor.has(name)) return;
    const used = new Set(seriesColor.values());
    const free = palette.find((c) => !used.has(c));
    if (free) seriesColor.set(name, free);
  }
  function releaseColor(name) {
    seriesColor.delete(name);
  }

  function draw(selection) {
    // Stable display order (not selection order) so the legend/lines don't
    // reshuffle as items are toggled — only color assignment (above) needs
    // to be selection-independent; display order is free to just follow the
    // source column order.
    const names = allSeries.filter((n) => selection.includes(n));

    const allVals = names.flatMap((n) => data.series[n].filter((v) => v != null));
    // Derive yMax from this single niceTicks call's own last tick — see
    // line_chart.js for why calling niceTicks twice can flip the step size
    // at certain boundary values and render a tick off the top of the chart.
    const yTicks = niceTicks(0, Math.max(1, ...allVals), 5);
    const yMax = yTicks[yTicks.length - 1];
    const y = (v) => padT + plotH - (v / yMax) * plotH;

    mount.innerHTML = "";
    const svg = el("svg", { viewBox: "0 0 " + W + " " + H, width: W, height: H }, mount);

    yTicks.forEach((t) => {
      const gy = y(t);
      el("line", { class: "grid-line", x1: padL, x2: W - padR, y1: gy, y2: gy }, svg);
      textEl(padL - 8, gy + 4, formatShort(t), { class: "axis-label", "text-anchor": "end" }, svg);
    });
    el("line", { class: "axis-line", x1: padL, x2: padL, y1: padT, y2: padT + plotH }, svg);

    const yearSpan = dates[dates.length - 1].getFullYear() - dates[0].getFullYear();
    const tickEvery = Math.max(1, Math.round(yearSpan / 9));
    for (let yr = dates[0].getFullYear(); yr <= dates[dates.length - 1].getFullYear(); yr += tickEvery) {
      const gx = x(new Date(yr, 0, 1));
      if (gx < padL || gx > W - padR) continue;
      const t = textEl(gx, H - padB + 16, "Jan " + yr, { class: "axis-label", "text-anchor": "end" }, svg);
      t.setAttribute("transform", "rotate(-30 " + gx + " " + (H - padB + 16) + ")");
    }

    const seriesInfo = [];
    names.forEach((name) => {
      const color = seriesColor.get(name) || palette[0];
      const values = data.series[name];
      let d = "";
      let lastX = null, lastY = null, lastV = null;
      values.forEach((v, j) => {
        if (v == null) return;
        const px = x(dates[j]), py = y(v);
        d += (d ? " L " : "M ") + px + " " + py;
        lastX = px; lastY = py; lastV = v;
      });
      el("path", { d, fill: "none", stroke: color, "stroke-width": 2, "stroke-linejoin": "round", "stroke-linecap": "round" }, svg);
      if (lastX != null) {
        el("circle", { cx: lastX, cy: lastY, r: 4, fill: color, stroke: "var(--surface)", "stroke-width": 2 }, svg);
      }
      seriesInfo.push({ name, color, values, lastX, lastY, lastV });
    });

    // Direct end labels are this chart's only identity mechanism (no
    // legend row — it would just duplicate these) — only when few enough
    // to avoid collision, which in practice is always true since this is
    // also the max number of series that can ever be concurrently shown.
    if (names.length <= palette.length) {
      const placed = [];
      seriesInfo
        .filter((s) => s.lastY != null)
        .sort((a, b) => a.lastY - b.lastY)
        .forEach((s) => {
          let ly = s.lastY;
          for (const p of placed) if (Math.abs(p - ly) < 16) ly = p + 16;
          placed.push(ly);
          if (ly !== s.lastY) {
            el("line", { x1: s.lastX + 6, x2: s.lastX + 16, y1: s.lastY, y2: ly, stroke: s.color, "stroke-width": 1, opacity: 0.5 }, svg);
          }
          const t = textEl(s.lastX + 10, ly + 4, s.name, { class: "end-label", fill: s.color }, svg);
          wrapEndLabel(t, s.name, padR - 16);
        });
    }

    // Greedy word-wrap by estimated character width, not word count — a
    // two-word name can still be too long to fit ("Information Technology"
    // overflowed past the card edge under the old ">2 words" rule, and with
    // no legend row as a fallback, a clipped label means that series has no
    // identity at all).
    function wrapEndLabel(textNode, str, maxWidth) {
      const maxCharsPerLine = Math.max(8, Math.floor(maxWidth / 6.2));
      if (str.length <= maxCharsPerLine) return;
      const words = str.split(" ");
      const lines = [];
      let line = "";
      words.forEach((w) => {
        const candidate = line ? line + " " + w : w;
        if (candidate.length > maxCharsPerLine && line) {
          lines.push(line);
          line = w;
        } else {
          line = candidate;
        }
      });
      if (line) lines.push(line);
      if (lines.length <= 1) return;

      textNode.textContent = "";
      const baseX = textNode.getAttribute("x"), baseY = +textNode.getAttribute("y");
      const lineHeight = 14;
      lines.forEach((l, i) => {
        el("tspan", { x: baseX, dy: i === 0 ? 0 : lineHeight }, textNode).textContent = l;
      });
      textNode.setAttribute("y", baseY - (lineHeight * (lines.length - 1)) / 2);
    }

    // hover crosshair + shared tooltip
    const hit = el("rect", { x: padL, y: padT, width: plotW, height: plotH, fill: "transparent" }, svg);
    const cross = el("line", { x1: 0, x2: 0, y1: padT, y2: padT + plotH, stroke: "var(--axis)", "stroke-width": 1, opacity: 0 }, svg);
    hit.addEventListener("pointermove", (ev) => {
      const rect = svg.getBoundingClientRect();
      const scale = rect.width / W;
      const mx = (ev.clientX - rect.left) / scale;
      let idx = 0, best = Infinity;
      dates.forEach((d, i) => { const dx = Math.abs(x(d) - mx); if (dx < best) { best = dx; idx = i; } });
      cross.setAttribute("x1", x(dates[idx])); cross.setAttribute("x2", x(dates[idx])); cross.setAttribute("opacity", 1);
      const rows = seriesInfo
        .filter((s) => s.values[idx] != null)
        .map((s) => ttRow(s.color, s.name, formatFull(s.values[idx])));
      if (rows.length) {
        showTooltip(ev.clientX, ev.clientY, ttBox(data.dates[idx], rows));
      }
    });
    hit.addEventListener("pointerleave", () => { cross.setAttribute("opacity", 0); hideTooltip(); });

    registerDownload(
      "line",
      cfg.downloadFilename,
      ["Date"].concat(names),
      data.dates.map((dt, i) => [dt].concat(names.map((n) => (data.series[n][i] != null ? formatFull(data.series[n][i]) : ""))))
    );
  }

  // ---------------------------------------------------------------------
  // Single-select: a plain dropdown, exactly one series at a time.
  // ---------------------------------------------------------------------
  function buildSingleSelect() {
    filterMount.innerHTML = "";
    const select = document.createElement("select");
    select.className = "filter-select";
    allSeries.forEach((name) => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    });
    const initial = cfg.defaultSeries[0] || allSeries[0];
    select.value = initial;
    assignColor(initial);
    select.addEventListener("change", () => {
      seriesColor.clear();
      assignColor(select.value);
      note.textContent = "Showing " + select.value + ".";
      draw([select.value]);
    });
    filterMount.appendChild(select);
    note.textContent = "Showing " + initial + ".";
    draw([initial]);
  }

  // ---------------------------------------------------------------------
  // Multi-select: a checkbox-list dropdown, up to len(palette) series at
  // once — the palette only has that many CVD-safe hues, so once the cap
  // is reached, unchecked boxes disable instead of silently reusing a color.
  // ---------------------------------------------------------------------
  function buildMultiSelect() {
    filterMount.innerHTML = "";
    const checked = new Set(cfg.defaultSeries.filter((n) => allSeries.includes(n)).slice(0, palette.length));
    checked.forEach(assignColor);

    const wrap = document.createElement("div");
    wrap.className = "multiselect";
    const button = document.createElement("button");
    button.type = "button";
    button.className = "multiselect-button";
    const label = document.createElement("span");
    const chevron = document.createElement("span");
    chevron.className = "chevron";
    chevron.textContent = "▾";
    button.appendChild(label);
    button.appendChild(chevron);

    const panel = document.createElement("div");
    panel.className = "multiselect-panel";

    function updateLabel() {
      label.textContent = checked.size ? checked.size + " of " + allSeries.length + " selected" : "None selected";
    }
    function updateDisabled() {
      const atCap = checked.size >= palette.length;
      panel.querySelectorAll("input[type=checkbox]").forEach((cb) => {
        if (!checked.has(cb.value)) cb.disabled = atCap;
      });
    }
    function updateNote() {
      note.textContent = checked.size >= palette.length
        ? "Showing the maximum of " + palette.length + " series — uncheck one to add another."
        : checked.size + " of " + allSeries.length + " series shown.";
    }

    allSeries.forEach((name) => {
      const row = document.createElement("label");
      row.className = "multiselect-option";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.value = name;
      cb.checked = checked.has(name);
      cb.addEventListener("change", () => {
        if (cb.checked) { checked.add(name); assignColor(name); }
        else { checked.delete(name); releaseColor(name); }
        updateLabel();
        updateDisabled();
        updateNote();
        draw(Array.from(checked));
      });
      row.appendChild(cb);
      const span = document.createElement("span");
      span.textContent = name;
      row.appendChild(span);
      panel.appendChild(row);
    });

    button.addEventListener("click", (ev) => {
      ev.stopPropagation();
      panel.classList.toggle("open");
    });
    document.addEventListener("click", (ev) => {
      if (!wrap.contains(ev.target)) panel.classList.remove("open");
    });

    wrap.appendChild(button);
    wrap.appendChild(panel);
    filterMount.appendChild(wrap);

    updateLabel();
    updateDisabled();
    updateNote();
    draw(Array.from(checked));
  }

  // ---------------------------------------------------------------------
  // Search: a free-text type-ahead ("Enter series to show") — matches the
  // live Tech Vector site's interaction pattern. Selected series were meant
  // to double as removable legend chips, but this chart has no legend row
  // (direct end-of-line labels are its only identity mechanism, so a legend
  // would just duplicate them) — _removeSeries below is currently dead code
  // as a result. Re-add a chip UI (or otherwise call filterMount
  // ._removeSeries) if this filterMode is ever turned back on.
  // ---------------------------------------------------------------------
  function buildSearchSelect() {
    filterMount.innerHTML = "";
    const checked = new Set(cfg.defaultSeries.filter((n) => allSeries.includes(n)).slice(0, palette.length));
    checked.forEach(assignColor);

    const wrap = document.createElement("div");
    wrap.className = "series-search";
    const input = document.createElement("input");
    input.type = "text";
    input.className = "series-search-input";
    input.placeholder = "Enter series to show";
    input.autocomplete = "off";
    const suggestions = document.createElement("div");
    suggestions.className = "series-suggestions";

    function updateNote() {
      note.textContent = checked.size >= palette.length
        ? "Showing the maximum of " + palette.length + " series — remove one (×) to add another."
        : checked.size + " of " + allSeries.length + " series shown.";
    }

    function renderSuggestions() {
      suggestions.innerHTML = "";
      if (checked.size >= palette.length) {
        const msg = document.createElement("div");
        msg.className = "series-suggestion disabled";
        msg.textContent = "Maximum of " + palette.length + " series shown.";
        suggestions.appendChild(msg);
        suggestions.classList.add("open");
        return;
      }
      const q = input.value.trim().toLowerCase();
      const matches = allSeries.filter((n) => !checked.has(n) && (q === "" || n.toLowerCase().includes(q)));
      if (!matches.length) {
        suggestions.classList.remove("open");
        return;
      }
      matches.slice(0, 8).forEach((name) => {
        const item = document.createElement("div");
        item.className = "series-suggestion";
        item.textContent = name;
        // mousedown, not click — fires before the input's blur hides the list
        item.addEventListener("mousedown", (ev) => { ev.preventDefault(); addSeries(name); });
        suggestions.appendChild(item);
      });
      suggestions.classList.add("open");
    }

    function addSeries(name) {
      checked.add(name);
      assignColor(name);
      input.value = "";
      renderSuggestions();
      updateNote();
      draw(Array.from(checked));
    }
    function removeSeries(name) {
      checked.delete(name);
      releaseColor(name);
      renderSuggestions();
      updateNote();
      draw(Array.from(checked));
    }
    filterMount._removeSeries = removeSeries;

    input.addEventListener("input", renderSuggestions);
    input.addEventListener("focus", renderSuggestions);
    input.addEventListener("blur", () => suggestions.classList.remove("open"));
    input.addEventListener("keydown", (ev) => {
      if (ev.key !== "Enter" || checked.size >= palette.length) return;
      const q = input.value.trim().toLowerCase();
      if (!q) return;
      const exact = allSeries.find((n) => !checked.has(n) && n.toLowerCase() === q);
      const firstMatch = allSeries.find((n) => !checked.has(n) && n.toLowerCase().includes(q));
      const pick = exact || firstMatch;
      if (pick) { addSeries(pick); ev.preventDefault(); }
    });

    wrap.appendChild(input);
    wrap.appendChild(suggestions);
    filterMount.appendChild(wrap);

    updateNote();
    draw(Array.from(checked));
  }

  if (cfg.filterMode === "single") {
    buildSingleSelect();
  } else if (cfg.filterMode === "search") {
    buildSearchSelect();
  } else {
    buildMultiSelect();
  }
}

renderInteractiveLine();
wireDownloadButtons();

})();
</script>
